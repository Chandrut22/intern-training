name: Backend CI

on:
  push:
    branches:
      - dev

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: day_24/backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: uv sync

      - name: Run Black
        run: uv run black --check .

      - name: Run Tests
        run: uv run pytest