name: Backend CI

on:
  push:
    branches:
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: day24/backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Depend
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest